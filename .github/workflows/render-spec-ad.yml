name: Render Spec Ad (A/B testing)

# Phase 4 of the spec-driven migration. Lives alongside the legacy
# `render-advertiser-ad.yml` workflow — manual dispatch only, never
# triggered by production code paths until Phase 7 switchover.
#
# Inputs are passed via env vars to the script (avoids shell-escaping
# issues with JSON payloads that contain double-quotes / backslashes).

on:
  workflow_dispatch:
    inputs:
      ad_id:
        description: "Ad UUID (used for the upload filename)"
        required: true
        type: string
      spec_json:
        description: "Full AdSpec object as a JSON string (generated upstream)"
        required: true
        type: string
      upload_path:
        description: "Optional storage path override (default: advertiser-ads-spec/{ad_id}.mp4)"
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Chrome/Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2-dev \
            libx11-xcb1

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      - name: Install render script dependencies
        working-directory: remotion
        run: npm install @remotion/renderer @remotion/bundler

      - name: Render and publish
        working-directory: remotion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AD_ID: ${{ github.event.inputs.ad_id }}
          SPEC_JSON: ${{ github.event.inputs.spec_json }}
          UPLOAD_PATH: ${{ github.event.inputs.upload_path }}
        run: node scripts/render-spec-ad.mjs
