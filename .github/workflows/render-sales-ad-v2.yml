name: Render Sales Ad v2

# Renderea el SalesAd v2 PER-PARTNER. Reemplaza al SalesAd original (que
# tenía problemas de autoplay en Fully Kiosk). Esta versión usa un Kling
# clip como background + Remotion overlay para texto y QR per-partner.
#
# El Kling clip vive en remotion/public/sales-ad-clip.mp4 — debe estar
# commiteado en el repo antes de correr este workflow.
#
# Trigger manual desde GitHub UI:
#   Actions → Render Sales Ad v2 → Run workflow → llenar inputs
#
# Output: ad-media/partner-sales-ads-v2/{screenId}.mp4 en Supabase Storage.

on:
  workflow_dispatch:
    inputs:
      screen_id:
        description: "Screen UUID del partner (ej. 154f35ed-ff6f-4354-978b-cff46a0b9f82)"
        required: true
        type: string
      business_name:
        description: "Nombre del negocio del partner (ej. 'Softmedia Barbería')"
        required: true
        type: string
      advertiser_signup_url:
        description: "URL referral de signup advertiser (ej. https://adscreenpro.com/register?role=advertiser&ref=XXX)"
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Chrome/Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2-dev \
            libx11-xcb1

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      - name: Ensure render script dependencies
        working-directory: remotion
        run: npm install @remotion/renderer @remotion/bundler qrcode @ffmpeg-installer/ffmpeg

      - name: Verify Kling sales-ad clip exists
        working-directory: remotion
        run: |
          if [ ! -f "public/Salesad.mp4" ]; then
            echo "❌ Falta public/Salesad.mp4"
            echo "Genera el clip en Kling con el prompt del SalesAd v2 y commitealo al repo antes."
            exit 1
          fi
          echo "✓ Kling clip OK ($(du -h public/Salesad.mp4 | cut -f1))"

      - name: Render SalesAd v2 and upload to Storage
        working-directory: remotion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/build-sales-ad-v2.mjs \
            "${{ github.event.inputs.screen_id }}" \
            "${{ github.event.inputs.business_name }}" \
            "${{ github.event.inputs.advertiser_signup_url }}"

      - name: Upload MP4 as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sales-ad-v2-${{ github.event.inputs.screen_id }}
          path: remotion/out/sales-ad-v2-${{ github.event.inputs.screen_id }}.mp4
          retention-days: 7
