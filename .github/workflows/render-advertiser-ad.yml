name: Render Advertiser Ad

on:
  workflow_dispatch:
    inputs:
      ad_id:
        description: "Ad UUID"
        required: true
        type: string
      photo_url:
        description: "Public URL of the enhanced photo"
        required: true
        type: string
      business_name:
        description: "Business name to display in the video"
        required: true
        type: string
      tagline:
        description: "Tagline (optional)"
        required: false
        type: string
      cta:
        description: "Call to action text"
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Chrome/Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2-dev \
            libx11-xcb1

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      - name: Install render script extra dependencies
        working-directory: remotion
        run: npm install @remotion/renderer @remotion/bundler

      - name: Render video and publish
        working-directory: remotion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/render-advertiser-ad.mjs \
            "${{ github.event.inputs.ad_id }}" \
            "${{ github.event.inputs.photo_url }}" \
            "${{ github.event.inputs.business_name }}" \
            "${{ github.event.inputs.tagline }}" \
            "${{ github.event.inputs.cta }}"
