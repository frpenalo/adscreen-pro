name: Render Awakening Teaser

# Renderiza el video "Awakening" PER-PARTNER. El Segmento D contiene un QR
# real que apunta a /selfie/:screenId, así que cada partner necesita su
# propio MP4. Mismo patrón que render-sales-ad.yml (workflow_dispatch manual).
#
# Trigger manual desde la UI de GitHub:
#   Actions → Render Awakening Teaser → Run workflow → llenar inputs
#
# Output: ad-media/partner-teasers/{screenId}.mp4 en Supabase Storage.

on:
  workflow_dispatch:
    inputs:
      screen_id:
        description: "Screen UUID del partner (ej. 154f35ed-ff6f-4354-978b-cff46a0b9f82)"
        required: true
        type: string
      selfie_url:
        description: "URL del selfie en producción (ej. https://adscreenpro.com/selfie/{screen_id})"
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    # Más timeout que sales-ad (15min) porque incluye 3 fuentes de Kling
    # (5+5+5=15s) + render de Remotion (6s) + concat con re-encode lento
    # (preset slow, crf 21 para calidad alta). En total ~5-8min de cómputo.
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # Necesitamos LFS o checkout completo para traer los 3 MP4 de Kling
        # que viven en remotion/assets/awakening/ (~26MB total). Por ahora
        # están commiteados como binarios normales — no necesitamos LFS.

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Chrome/Chromium deps para Remotion renderer — idéntico a los otros
      # workflows. Sin estos, Remotion explota con missing shared lib errors.
      - name: Install Chrome/Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2-dev \
            libx11-xcb1

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      # El script importa @remotion/renderer, @remotion/bundler, qrcode, y
      # @ffmpeg-installer/ffmpeg. Los dos primeros y qrcode ya están en
      # package.json; ffmpeg-installer lo agregué ayer. npm install arriba
      # ya los trae. Este paso es belt-and-suspenders por si alguno se queda
      # como devDependency o falla la resolución.
      - name: Ensure render script dependencies
        working-directory: remotion
        run: npm install @remotion/renderer @remotion/bundler qrcode @ffmpeg-installer/ffmpeg

      - name: Verify Kling source segments exist
        working-directory: remotion
        run: |
          for f in "assets/awakening/awakening 1.mp4" "assets/awakening/awakening 2.mp4" "assets/awakening/awakening 3.mp4"; do
            if [ ! -f "$f" ]; then
              echo "❌ Falta: $f"
              exit 1
            fi
            echo "✓ $f ($(du -h "$f" | cut -f1))"
          done

      - name: Render teaser and upload to Storage
        working-directory: remotion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/build-awakening-teaser.mjs \
            "${{ github.event.inputs.screen_id }}" \
            "${{ github.event.inputs.selfie_url }}"

      # Subo el MP4 final como artifact también — útil para descargar y
      # revisar antes de que llegue a las TVs. Se mantiene 7 días (default
      # GH Actions). Si quieres extender pon retention-days: 30.
      - name: Upload MP4 as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: awakening-teaser-${{ github.event.inputs.screen_id }}
          path: remotion/out/awakening-teaser-${{ github.event.inputs.screen_id }}.mp4
          retention-days: 7
