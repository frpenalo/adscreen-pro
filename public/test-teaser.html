<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Teaser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    .info {
      position: fixed;
      top: 8px;
      left: 8px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="info" id="status">esperando...</div>
  <video
    id="v"
    src="/test-teaser.mp4"
    autoplay
    muted
    playsinline
    loop
    preload="auto"
  ></video>
  <script>
    // Test diagnóstico: ¿puede Fully Kiosk autoplayar este MP4 en un
    // <video> element mínimo (sin React, sin nada más)? Si SÍ → el
    // problema es el player React. Si NO → es Fully Kiosk + este MP4
    // en cualquier contexto HTML.
    const v = document.getElementById('v');
    const s = document.getElementById('status');
    let log = (msg) => { s.textContent = msg; console.log('[test]', msg); };

    v.muted = true; // forzar imperativamente
    log('mounted, calling play()...');

    v.addEventListener('loadedmetadata', () => log('loadedmetadata: duration=' + v.duration.toFixed(1) + 's'));
    v.addEventListener('canplay', () => log('canplay'));
    v.addEventListener('play', () => log('▶ play event fired'));
    v.addEventListener('playing', () => log('▶▶ playing (frames rendering)'));
    v.addEventListener('pause', () => log('⏸ pause'));
    v.addEventListener('ended', () => log('✓ ended'));
    v.addEventListener('error', () => log('❌ error: ' + JSON.stringify({code: v.error?.code, msg: v.error?.message})));
    v.addEventListener('stalled', () => log('⚠ stalled'));
    v.addEventListener('waiting', () => log('⚠ waiting'));

    v.play()
      .then(() => log('play() resolved'))
      .catch((err) => log('play() rejected: ' + err.name + ': ' + err.message));
  </script>
</body>
</html>
